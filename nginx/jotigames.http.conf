map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# ── Gzip compression ───────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  application/json
  application/javascript
  text/xml
  application/xml
  application/xml+rss
  text/javascript
  image/svg+xml
  application/wasm;

# ── Rate-limiting zones ─────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_api:10m rate=30r/s;

server {
  listen 80;
  listen [::]:80;
  server_name jotigames.nl www.jotigames.nl;

  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  # ── Request body size limit ────────────────────────────────────────────
  client_max_body_size 2m;

  # ── Hashed build assets (immutable) ──────────────────────────────────
  location /assets/ {
    alias /var/www/jotigames.nl/frontend/dist/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    gzip_static on;
    access_log off;
  }

  # ── Static public files (images, uploads) ────────────────────────────
  location /image/ {
    alias /var/www/jotigames.nl/frontend/dist/image/;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
  }

  location /uploads/ {
    alias /var/www/jotigames.nl/frontend/dist/uploads/;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
  }

  location /fonts/ {
    alias /var/www/jotigames.nl/frontend/dist/fonts/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location /api/auth/ {
    limit_req zone=auth_api burst=20 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=general_api burst=60 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:4173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

